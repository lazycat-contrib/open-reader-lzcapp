version: 1
project:
  root: .
  build_config: lzc-build.yml
  package_file: package.yml
  output: dist/openreader.lpk
update:
  strategy: publish
  allow_downgrade: false
  version_source:
    type: image
    image: openreader
build:
  run_buildscript: false
images:
  - id: openreader
    target: service
    service: openreader-webui
    source: ghcr.io/richardr1126/openreader-webui
    channel: stable
    tag_regex: '^v?[0-9]+\.[0-9]+\.[0-9]+$'
    delivery:
      mode: lazycat
stores:
  official:
    enabled: true
    skip_if_version_exists: true
  private:
    enabled: true
    skip_if_version_exists: true
    name: OpenReader
    summary: 支持多种文档格式的文本转语音阅读器

